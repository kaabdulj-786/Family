<!DOCTYPE html>
<html>
<head>
<title>Illath Al Kathiri</title>

<style>
body{margin:0;font-family:Segoe UI;background:#f1f5f9;}
.header{padding:15px;background:white;}
.container{padding:20px;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:10px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.box{background:white;padding:10px;border-radius:8px;text-align:center;}
.today{border:2px solid green;}
.done{opacity:0.5;}
</style>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>

<div class="header">
<img src="logo.png" width="40"> ILLATH AL KATHIRI
</div>

<div class="container">
<h3>Announcements</h3><div id="ann"></div>
<h3>Mowlid</h3><div id="mow"></div>
<h3>Tabarruk</h3><div id="tab"></div>
<h3>Birthdays</h3><div id="bd"></div>
<h3>Tree</h3><div id="tree"></div>
</div>

<script>
const firebaseConfig={
apiKey:"AIzaSyB4KiyI-vapW5rvY-VNKTHELfmkO3H4D0M",
authDomain:"family-6889b.firebaseapp.com",
databaseURL:"https://family-6889b-default-rtdb.firebaseio.com",
projectId:"family-6889b"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let m,t,b,a,p;

/* LOAD */
db.ref("mowlid").on("value",s=>{m=s.val();render();});
db.ref("tabarruk").on("value",s=>{t=s.val();render();});
db.ref("birthdays").on("value",s=>{b=s.val();render();});
db.ref("announcements").on("value",s=>{a=s.val();render();});
db.ref("people").on("value",s=>{p=s.val();renderTree();});

/* RENDER */
function render(){
let now=new Date();

/* ANN */
let ah="";
for(let i in a){
let f=new Date(a[i].from),to=new Date(a[i].to);
if(now>=f&&now<=to){
ah+=`<div class="card">${a[i].title}<br>${a[i].text}</div>`;
}
}
ann.innerHTML=ah;

/* MOWLID */
if(m){
mow.innerHTML=`<div class="card">${m.name}</div>`;
}

/* TAB */
let th='<div class="grid">';
let i=0;
for(let k in t){
th+=`<div class="box">${t[k].name||"-"}</div>`;
}
th+='</div>';
tab.innerHTML=th;

/* BD */
let bh="";
for(let i in b){
let d=new Date(b[i].dob);
let age=new Date().getFullYear()-d.getFullYear();
bh+=`<div class="card">${b[i].name}<br>Turns ${age}</div>`;
}
bd.innerHTML=bh;
}

/* TREE */
function renderTree(){
let h="";
for(let i in p){
h+=`<div class="card">${p[i].name}</div>`;
}
tree.innerHTML=h;
}
</script>

</body>
</html>
