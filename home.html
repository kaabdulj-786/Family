<!DOCTYPE html>
<html>
<head>

<title>Illath Al Kathiri</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

</head>

<body>

<div class="public-header">

  <div style="display:flex;align-items:center;gap:12px">

    <img src="logo.png" class="logo">

    <div class="title">
      ILLATH AL KATHIRI
    </div>

  </div>

  <button class="primary-btn" onclick="openBirthdayPopup()">
    🎂 Birthdays
  </button>

</div>

<div class="container">

  <!-- ANNOUNCEMENTS -->
  <div class="section-title">📢 Announcements</div>

  <div id="announcementSection"></div>

  <!-- MOWLID -->
  <div class="section-title">🕌 Mowlid</div>

  <div id="mowlidSection"></div>

  <!-- TABARRUK -->
  <div class="section-title">🍽️ Tabarruk</div>

  <div id="tabarrukSection"></div>

  <!-- BIRTHDAYS -->
  <div class="section-title">🎂 Today's Birthdays</div>

  <div id="birthdaySection"></div>
  <div class="section-title">
  🌳 Family Tree
</div>

<div id="treeTabs"></div>

<div id="familyTreeContainer"></div>

</div>

<!-- BIRTHDAY POPUP -->
<div id="birthdayPopup" class="popup">

  <div class="popup-box">

    <h2>🎂 Family Birthdays</h2>

    <div id="birthdayPopupList"></div>

    <br>

    <button class="primary-btn"
    onclick="closeBirthdayPopup()">
      Close
    </button>

  </div>

</div>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyB4KiyI-vapW5rvY-VNKTHELfmkO3H4D0M",
  authDomain: "family-6889b.firebaseapp.com",
  databaseURL: "https://family-6889b-default-rtdb.firebaseio.com",
  projectId: "family-6889b"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let mowlidData = null;
let tabData = {};
let birthdayData = {};
let announcementData = {};
let statusData = {};
let todayIndex = -1;
let treesData = {};
let peopleData = {};
let activeTree = null;

/* ===========================
   LOAD DATA
=========================== */

db.ref("mowlid").on("value",s=>{
  mowlidData = s.val();
  renderAll();
});

db.ref("tabarruk").on("value",s=>{
  tabData = s.val() || {};
  renderAll();
});

db.ref("birthdays").on("value",s=>{
  birthdayData = s.val() || {};
  renderAll();
});

db.ref("announcements").on("value",s=>{
  announcementData = s.val() || {};
  renderAll();
});
db.ref("mowlidStatus").on("value",s=>{
  statusData = s.val() || {};
  renderAll();
});
  db.ref("trees").on("value",s=>{
  treesData = s.val() || {};
  renderTreeTabs();
});

db.ref("people").on("value",s=>{
  peopleData = s.val() || {};
  renderFamilyTree();
});
/* ===========================
   MAIN RENDER
=========================== */

function renderAll(){

  let now = new Date();

  /* ======================
     📢 ANNOUNCEMENTS
  ====================== */

  let annHTML = "";

  let foundAnnouncement = false;

  for(let id in announcementData){

    let a = announcementData[id];

    let from = new Date(a.from);
    let to = new Date(a.to);

    if(now >= from && now <= to){

      foundAnnouncement = true;

      annHTML += `

        <div class="card">

          <h3>${a.title}</h3>

          <div>${a.text}</div>

          <br>

          <small>
            ${from.toDateString()}
            →
            ${to.toDateString()}
          </small>

        </div>
      `;
    }
  }

  if(!foundAnnouncement){

    annHTML = `
      <div class="card empty">
        No Active Announcements
      </div>
    `;
  }

  announcementSection.innerHTML = annHTML;

  /* ======================
     🕌 MOWLID
  ====================== */

  if(mowlidData){

    let start = new Date(mowlidData.start);

    let end = new Date(start);

    end.setDate(end.getDate() + mowlidData.days - 1);

    let diff = Math.floor(
      (now - start) / (1000*60*60*24)
    );

    todayIndex = -1;

    let status = "Upcoming";

let badge = "badge-upcoming";

if(diff >= 0 && diff < mowlidData.days){

  todayIndex = diff;

  let key = "day"+(todayIndex+1);

  let s = statusData[key];

  if(s){

    if(s.status === "ongoing"){

      status = "Ongoing";

      badge = "badge-started";
    }

    else if(s.status === "completed"){

      status = "Completed";

      badge = "badge-completed";
    }

    else{

      status = "Not Started";

      badge = "badge-upcoming";
    }

  }else{

    status = "Not Started";

    badge = "badge-upcoming";
  }
}

if(diff >= mowlidData.days){

  status = "Completed";

  badge = "badge-completed";

  todayIndex = mowlidData.days - 1;
}

    mowlidSection.innerHTML = `

      <div class="card">

        <div style="
          display:flex;
          justify-content:space-between;
          align-items:center;
        ">

          <div>

            <h2>${mowlidData.name}</h2>

            <small>
              ${start.toDateString()}
              →
              ${end.toDateString()}
            </small>

            <br><br>

            <b>
              ${
                todayIndex >= 0
                ? "Day " + (todayIndex+1)
                : "Not Started"
              }
            </b>

          </div>

          <div>

            <span class="badge ${badge}">
              ${status}
            </span>

          </div>

        </div>

      </div>
    `;
  }
  else{

    mowlidSection.innerHTML = `
      <div class="card empty">
        No Mowlid Scheduled
      </div>
    `;
  }

  /* ======================
     🍽️ TABARRUK
  ====================== */

  let tabHTML = `
    <div class="grid">
  `;

  let i = 0;

  for(let day in tabData){

    let cls = "tab-box";

    if(i === todayIndex){
      cls += " today-box";
    }

    if(i < todayIndex){
      cls += " completed-box";
    }

    tabHTML += `

      <div class="${cls}">

        <h3>Day ${i+1}</h3>

        <div>
          ${tabData[day].name || "-"}
        </div>

        <br>

        <small>
          ${tabData[day].remarks || ""}
        </small>

      </div>
    `;

    i++;
  }

  tabHTML += `</div>`;

  if(i === 0){

    tabHTML = `
      <div class="card empty">
        No Tabarruk Added
      </div>
    `;
  }

  tabarrukSection.innerHTML = tabHTML;

  /* ======================
     🎂 BIRTHDAYS
  ====================== */

  let birthdayHTML = "";

  let hasBirthday = false;

  for(let id in birthdayData){

    let b = birthdayData[id];

    let dob = new Date(b.dob);

    if(
      dob.getDate() === now.getDate()
      &&
      dob.getMonth() === now.getMonth()
    ){

      hasBirthday = true;

      let age =
        now.getFullYear()
        -
        dob.getFullYear();

     birthdayHTML += `

<div class="card" style="
  background:linear-gradient(
    135deg,
    #f59e0b,
    #f97316
  );
  color:white;
">

  <div style="
    display:flex;
    align-items:center;
    gap:18px;
  ">

    <div style="
      font-size:42px;
    ">
      🎂
    </div>

    <div>

      <h2 style="
        margin:0;
        font-size:28px;
      ">
        ${b.name}
      </h2>

      <div style="
        margin-top:6px;
        font-size:16px;
      ">
        Turns ${age}
      </div>

      <div style="
        margin-top:10px;
        opacity:0.92;
      ">
        ✨ Happy Birthday!
        May Allah bless you
      </div>

    </div>

  </div>

</div>
`;
    }
  }

  if(!hasBirthday){

    birthdayHTML = `
      <div class="card empty">
        No Birthdays Today
      </div>
    `;
  }

  birthdaySection.innerHTML = birthdayHTML;
}

/* ===========================
   🎂 POPUP
=========================== */

function openBirthdayPopup(){

  birthdayPopup.style.display = "flex";

  let html = "";

  for(let id in birthdayData){

    let b = birthdayData[id];

    let dob = new Date(b.dob);

    let age =
      new Date().getFullYear()
      -
      dob.getFullYear();

    html += `

      <div class="card">

        <b>${b.name}</b>

        <br>

        Turns ${age}

      </div>
    `;
  }

  birthdayPopupList.innerHTML = html;
}

function closeBirthdayPopup(){

  birthdayPopup.style.display = "none";
}
/* =========================
   🌳 PUBLIC TREE VIEW
========================= */

function renderTreeTabs(){

  let html = "";

  let first = null;

  for(let id in treesData){

    if(!first) first = id;

    html += `
      <div
        class="
          tree-tab
          ${activeTree===id?'active':''}
        "
        onclick="switchTree('${id}')"
      >
        ${treesData[id].name}
      </div>
    `;
  }

  treeTabs.innerHTML = html;

  if(!activeTree && first){

    activeTree = first;

    renderTreeTabs();

    renderFamilyTree();
  }
}

function switchTree(id){

  activeTree = id;

  renderTreeTabs();

  renderFamilyTree();
}

function renderFamilyTree(){
 
  if(!activeTree) return;

  let people = [];

  for(let id in peopleData){

    let p = peopleData[id];

    if(
      p.trees &&
      p.trees[activeTree]
    ){

      people.push({
        id:id,
        ...p
      });
    }
  }

/* =========================
   🌳 FAMILY UNIT GENERATION
========================= */

let roots = people.filter(
  p => !p.father
);

let generations = [];

let processed = new Set();
let expandedCouples = new Set();

function buildGeneration(nodes,level){

  if(!generations[level]){
    generations[level] = [];
  }

  nodes.forEach(person=>{

    if(processed.has(person.id)) return;

    processed.add(person.id);

    let spouse = null;


/* ======================
   FIND SPOUSE
====================== */

let minimalOnly = false;

if(
  person.spouse &&
  peopleData[person.spouse]
){

  let s = peopleData[person.spouse];

  if(
    s.trees &&
    s.trees[activeTree]
  ){

    let pairKey =
      [person.id,s.id]
      .sort()
      .join("-");

    /* ======================
       ALREADY EXPANDED?
    ====================== */

    if(
      expandedCouples.has(pairKey)
    ){

      minimalOnly = true;
    }

    else{

      spouse = {
        id:person.spouse,
        ...s
      };

      expandedCouples.add(
        pairKey
      );

      processed.add(spouse.id);
    }
  }
}

    /* ======================
       CREATE FAMILY UNIT
    ====================== */

let familyUnit = {

  mainPerson:person,

  spouse:spouse,

  minimalOnly:minimalOnly,

  children:[]
};

    /* ======================
       FIND CHILDREN
    ====================== */

    let children = people.filter(
      p => p.father === person.id
    );

    if(!minimalOnly){
  familyUnit.children = children;
}

    generations[level].push(
      familyUnit
    );

    /* ======================
       NEXT GENERATION
    ====================== */

    if(children.length){

      buildGeneration(
        children,
        level+1
      );
    }
  });
}

buildGeneration(roots,0);

  let html = `
  <div class="tree-wrapper">

    <div class="tree-area">

      <svg
        class="tree-svg"
        id="treeSVG"
      ></svg>
`;

  generations.forEach(gen=>{

    html += `
      <div class="generation">
    `;

gen.forEach(unit=>{

  let person = unit.mainPerson;

  let spouse = unit.spouse;

  let shared =
    person.trees &&
    Object.keys(
      person.trees
    ).length > 1;

  html += `

  <div class="family-unit">

    <!-- MAIN PERSON -->

    <div
      id="person-${person.id}"
      class="
        person-card
        ${shared?'shared-person':''}
      "
    >

      ${
        shared
        ?
        `
        <div class="shared-badge">
          Shared
        </div>
        `
        :
        ""
      }

      <div class="person-name">
        ${person.name}
      </div>

      <div class="person-meta">

        ${
          person.gender==="male"
          ? "👨 Male"
          : "👩 Female"
        }

      </div>

    </div>

    ${
      spouse
      ?
      `

      <!-- SPOUSE -->

      <div class="spouse-link"></div>

      <div
        id="person-${spouse.id}"
        class="person-card spouse-card"
      >

        <div class="person-name">
          ${spouse.name}
        </div>

        <div class="person-meta">

          ${
            spouse.gender==="male"
            ? "👨 Male"
            : "👩 Female"
          }

        </div>

      </div>

      `
      :
      ""
    }

  </div>
  `;
});

    html += `
      </div>
    `;
  });

html += `
    </div>
  </div>
  `;

  familyTreeContainer.innerHTML = html;
  setTimeout(drawTreeLines,100);
  
}
  
function drawTreeLines(){

  let svg = document.getElementById("treeSVG");

  if(!svg) return;

  svg.innerHTML = "";

  let svgRect =
    svg.getBoundingClientRect();

  /* ======================
     LOOP FAMILY UNITS
  ====================== */

  let familyUnits =
    document.querySelectorAll(
      ".family-unit"
    );

  familyUnits.forEach(unit=>{

    let cards =
      unit.querySelectorAll(
        ".person-card"
      );

    if(cards.length === 0) return;

    /* ======================
       FIND FAMILY CENTER
    ====================== */

    let firstRect =
      cards[0].getBoundingClientRect();

    let lastRect =
      cards[
        cards.length - 1
      ].getBoundingClientRect();

    let centerX =
      (
        firstRect.left +
        lastRect.right
      ) / 2
      -
      svgRect.left;

    let centerY =
      firstRect.bottom
      -
      svgRect.top;

    /* ======================
       FIND MAIN PERSON
    ====================== */

    let mainCard = cards[0];

    let mainId =
      mainCard.id.replace(
        "person-",
        ""
      );

    /* ======================
       FIND CHILDREN
    ====================== */

    for(let id in peopleData){

      let child =
        peopleData[id];

      if(
        child.father !== mainId
      ) continue;

      if(
        !child.trees
        ||
        !child.trees[activeTree]
      ) continue;

      let childCard =
        document.getElementById(
          "person-"+id
        );

      if(!childCard) continue;

      let childRect =
        childCard.getBoundingClientRect();

      let childX =
        childRect.left +
        childRect.width/2 -
        svgRect.left;

      let childY =
        childRect.top -
        svgRect.top;

      let midY =
        (centerY + childY)/2;

      let path = `
        M ${centerX} ${centerY}
        V ${midY}
        H ${childX}
        V ${childY}
      `;

      svg.innerHTML += `
        <path
          d="${path}"
          class="connector-line"
        />
      `;
    }
  });
}
</script>

</body>
</html>
