<script>

/* ===========================
   LOGIN GUARD
=========================== */
if(
  !sessionStorage.getItem("familyLogged") &&
  !sessionStorage.getItem("adminLogged") &&
  !localStorage.getItem("familyLogged")
){
  location.href = "index.html";
}

/* ===========================
   FIREBASE INIT
=========================== */

const firebaseConfig = {
  apiKey: "AIzaSyB4KiyI-vapW5rvY-VNKTHELfmkO3H4D0M",
  authDomain: "family-6889b.firebaseapp.com",
  databaseURL: "https://family-6889b-default-rtdb.firebaseio.com",
  projectId: "family-6889b"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();

let mowlidData = null;
let tabData = {};
let birthdayData = {};
let announcementData = {};
let eventData = {};
let statusData = {};
let todayIndex = -1;
let mowlidIsActivePeriod = false;
let treesData = {};
let peopleData = {};
let activeTree = null;

const COMPLETED_REVERT_MS = 6 * 60 * 60 * 1000; // 6 hours

/* ===========================
   LOAD DATA
=========================== */

db.ref("mowlid").on("value", s=>{ mowlidData = s.val(); renderAll(); });
db.ref("tabarruk").on("value", s=>{ tabData = s.val() || {}; renderAll(); });
db.ref("birthdays").on("value", s=>{ birthdayData = s.val() || {}; renderAll(); });
db.ref("announcements").on("value", s=>{ announcementData = s.val() || {}; renderAll(); });
db.ref("events").on("value", s=>{ eventData = s.val() || {}; renderAll(); });
db.ref("mowlidStatus").on("value", s=>{ statusData = s.val() || {}; renderAll(); });

db.ref("trees").on("value", s=>{ treesData = s.val() || {}; renderTreeTabs(); });
db.ref("people").on("value", s=>{ peopleData = s.val() || {}; renderFamilyTree(); });

/* ===========================
   MAIN RENDER
=========================== */

function renderAll(){

  let now = new Date();

  renderAnnouncements(now);
  renderEvents(now);
  renderMowlid(now);
  renderTabarruk();
  renderBirthdaysToday(now);
  renderUpcomingBirthdays(now);
  reorderSections();
}

/* ======================
   📢 ANNOUNCEMENTS
====================== */

function renderAnnouncements(now){

  let html = "";
  let found = false;

  let entries = Object.entries(announcementData)
    .filter(([id,a])=> now >= new Date(a.from) && now <= new Date(a.to))
    .sort((a,b)=> new Date(a[1].from) - new Date(b[1].from));

  entries.forEach(([id,a])=>{
    found = true;
    html += `
      <div class="card">
        <h3>${escapeHtml(a.title)}</h3>
        <div>${escapeHtml(a.text||"")}</div>
        <br>
        <small style="color:#64748b">
          ${new Date(a.from).toDateString()} → ${new Date(a.to).toDateString()}
        </small>
      </div>
    `;
  });

  announcementSection.innerHTML = found ? html : `<div class="card empty">No Active Announcements</div>`;
}

/* ======================
   🎉 EVENTS & GATHERINGS
   Only shows events whose date/time hasn't passed yet.
====================== */

function renderEvents(now){

  let upcoming = Object.values(eventData)
    .filter(e => new Date(e.dateTime) >= now)
    .sort((a,b)=> new Date(a.dateTime) - new Date(b.dateTime));

  if(upcoming.length === 0){
    eventSection.innerHTML = `<div class="card empty">No Upcoming Events</div>`;
    return;
  }

  eventSection.innerHTML = upcoming.map(e=>{

    let dt = new Date(e.dateTime);
    let month = dt.toLocaleDateString('en-GB', { month:'short' });
    let time = dt.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });

    return `
      <div class="event-card">
        <div class="event-date-badge">
          <div class="day">${dt.getDate()}</div>
          <div class="month">${month}</div>
        </div>
        <div class="event-body">
          <h3>${escapeHtml(e.name)}</h3>
          <div class="event-meta">
            🕐 ${time}${e.venue ? " &nbsp;·&nbsp; 📍 " + escapeHtml(e.venue) : ""}
          </div>
          ${e.organiser ? `<div class="event-meta">👤 Organised by ${escapeHtml(e.organiser)}</div>` : ""}
          ${e.note ? `<div class="event-note">${escapeHtml(e.note)}</div>` : ""}
        </div>
      </div>
    `;
  }).join("");
}

/* ======================
   🕌 MOWLID
====================== */

function computeMowlidStatus(now){

  if(!mowlidData) return { active:false };

  let start = new Date(mowlidData.start);
  start.setHours(0,0,0,0);

  let end = new Date(start);
  end.setDate(end.getDate() + mowlidData.days - 1);

  let diff = Math.floor((now - start) / (1000*60*60*24));

  let ended = diff >= mowlidData.days;
  let inRange = diff >= 0 && !ended;
  let dayIndex = inRange ? diff : -1;

  let status = "notstarted";

  if(inRange){
    let key = "day" + (dayIndex+1);
    let raw = statusData[key];

    if(raw){
      if(raw.status === "completed"){
        if(raw.completedAt && (Date.now() - raw.completedAt) < COMPLETED_REVERT_MS){
          status = "completed";
        } else {
          status = "notstarted"; // auto-reverted after 6 hours
        }
      } else if(raw.status === "ongoing"){
        status = "ongoing";
      }
    }
  }

  return { active:true, ended, inRange, start, end, dayIndex, status };
}

function renderMowlid(now){

  todayIndex = -1;
  mowlidIsActivePeriod = false;

  if(!mowlidData){
    mowlidSection.innerHTML = "";
    document.getElementById("sec-mowlid").style.display = "none";
    document.getElementById("sec-tabarruk").style.display = "none";
    return;
  }

  let info = computeMowlidStatus(now);

  /* Once the whole schedule has ended, the Mowlid + Tabarruk
     sections vanish from the public view entirely (per spec). */
  if(info.ended){
    mowlidSection.innerHTML = "";
    document.getElementById("sec-mowlid").style.display = "none";
    document.getElementById("sec-tabarruk").style.display = "none";
    return;
  }

  document.getElementById("sec-mowlid").style.display = "";
  document.getElementById("sec-tabarruk").style.display = "";

  todayIndex = info.dayIndex;
  mowlidIsActivePeriod = info.inRange;

  let badgeClass = "badge-upcoming";
  let label = "Not Started";

  if(info.status === "ongoing"){ badgeClass = "badge-started"; label = "Ongoing"; }
  else if(info.status === "completed"){ badgeClass = "badge-completed"; label = "Completed"; }

  let organiserLine = "";

  if(info.dayIndex >= 0){
    let key = "day" + (info.dayIndex + 1);
    let tabEntry = tabData[key];
    if(tabEntry && tabEntry.name){
      organiserLine = `<div class="mowlid-dates">🍽️ Today's Tabarruk: <b>${escapeHtml(tabEntry.name)}</b></div>`;
    }
  }

  mowlidSection.innerHTML = `
    <div class="mowlid-card ${info.inRange ? 'priority-glow' : ''}">
      <div class="mowlid-left">
        <h2>${escapeHtml(mowlidData.name)}</h2>
        <div class="mowlid-day">
          ${info.dayIndex >= 0 ? "Day " + (info.dayIndex+1) + " of " + mowlidData.days : "Not Started Yet"}
        </div>
        <div class="mowlid-dates">
          ${info.start.toDateString()} → ${info.end.toDateString()}
        </div>
        ${organiserLine}
      </div>
      <div class="mowlid-right">
        <span class="badge ${badgeClass}">${label}</span>
        ${info.inRange ? `<button class="edit-icon" onclick="openStatusPopup()" title="Update status">✏️</button>` : ""}
      </div>
    </div>
  `;
}

function openStatusPopup(){

  if(todayIndex < 0){
    showBriefMessage("Mowlid isn't active today");
    return;
  }

  let now = new Date();
  let info = computeMowlidStatus(now);
  let body = document.getElementById("statusPopupBody");

  if(info.status === "notstarted"){

    body.innerHTML = `
      <h2>Start Today's Mowlid?</h2>
      <p style="color:#64748b;font-size:13px;margin-top:-10px">
        Anyone in the family can do this — no admin needed.
      </p>
      <button class="primary-btn" style="width:100%" onclick="setMowlidStatus('ongoing')">
        ▶️ Mark as Started
      </button>
    `;

  } else if(info.status === "ongoing"){

    body.innerHTML = `
      <h2>Currently: Started / Ongoing</h2>
      <p style="color:#64748b;font-size:13px;margin-top:-10px">
        Once finished for today, mark it complete below.
      </p>
      <label class="field-label">Choose an action</label>
      <select id="statusActionSelect" onchange="handleStatusAction(this.value)">
        <option value="">-- Select --</option>
        <option value="completed">✅ Mark as Completed</option>
      </select>
    `;

  } else if(info.status === "completed"){

    let key = "day" + (todayIndex+1);
    let raw = statusData[key];
    let remainingMs = COMPLETED_REVERT_MS - (Date.now() - (raw ? raw.completedAt : 0));
    let hrs = Math.max(0, Math.floor(remainingMs / (1000*60*60)));
    let mins = Math.max(0, Math.floor((remainingMs % (1000*60*60)) / (1000*60)));

    body.innerHTML = `
      <h2>✅ Completed</h2>
      <p style="color:#64748b;font-size:13px">
        This will automatically reset to Not Started in
        <b>${hrs}h ${mins}m</b>. No action needed.
      </p>
    `;
  }

  statusPopup.style.display = "flex";
}

function handleStatusAction(value){
  if(!value) return;
  setMowlidStatus(value);
}

function closeStatusPopup(){
  statusPopup.style.display = "none";
}

function setMowlidStatus(status){

  if(todayIndex < 0) return;

  let key = "day" + (todayIndex+1);

  let payload = {
    status: status,
    completedAt: status === "completed" ? Date.now() : null,
    updatedAt: Date.now()
  };

  db.ref("mowlidStatus/"+key).set(payload);

  closeStatusPopup();
}

/* ======================
   🍽️ TABARRUK
====================== */

function renderTabarruk(){

  let dayIds = Object.keys(tabData).sort((a,b)=>{
    return parseInt(a.replace("day","")) - parseInt(b.replace("day",""));
  });

  if(dayIds.length === 0){
    tabarrukSection.innerHTML = `<div class="card empty">No Tabarruk Added</div>`;
    return;
  }

  let start = mowlidData ? new Date(mowlidData.start) : null;

  let rows = dayIds.map((key,i)=>{

    let entry = tabData[key];
    let dateLabel = "-";

    if(start){
      let d = new Date(start);
      d.setDate(d.getDate() + i);
      dateLabel = d.toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
    }

    let cls = (i === todayIndex) ? "today-row" : "";

    return `
      <tr class="${cls}">
        <td>Day ${i+1}</td>
        <td>${dateLabel}</td>
        <td>${escapeHtml(entry.name || "-")}</td>
        <td>${escapeHtml(entry.remarks || "-")}</td>
      </tr>
    `;
  }).join("");

  tabarrukSection.innerHTML = `
    <table class="tab-table">
      <thead>
        <tr><th>Day</th><th>Date</th><th>Name</th><th>Remarks</th></tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
}

/* ======================
   🎂 BIRTHDAYS (age calc fixed)
====================== */

function calcAge(dobStr){

  let dob = new Date(dobStr);
  let now = new Date();

  let age = now.getFullYear() - dob.getFullYear();

  let hadBirthdayThisYear =
    (now.getMonth() > dob.getMonth()) ||
    (now.getMonth() === dob.getMonth() && now.getDate() >= dob.getDate());

  if(!hadBirthdayThisYear) age--;

  return age;
}

function daysUntilBirthday(dobStr, now){

  let dob = new Date(dobStr);

  let next = new Date(now.getFullYear(), dob.getMonth(), dob.getDate());
  let nowMid = new Date(now.getFullYear(), now.getMonth(), now.getDate());

  if(next < nowMid) next.setFullYear(now.getFullYear()+1);

  return Math.round((next - nowMid) / (1000*60*60*24));
}

function renderBirthdaysToday(now){

  let html = "";
  let has = false;

  for(let id in birthdayData){

    let b = birthdayData[id];
    let dob = new Date(b.dob);

    if(dob.getDate() === now.getDate() && dob.getMonth() === now.getMonth()){

      has = true;

      html += `
        <div class="card" style="background:linear-gradient(135deg,#f59e0b,#f97316);color:white">
          <div style="display:flex;align-items:center;gap:18px">
            <div style="font-size:42px">🎂</div>
            <div>
              <h2 style="margin:0;font-size:26px">${escapeHtml(b.name)}</h2>
              <div style="margin-top:6px;font-size:15px">Turns ${calcAge(b.dob)}</div>
              <div style="margin-top:8px;opacity:0.92">✨ Happy Birthday! May Allah bless you</div>
            </div>
          </div>
        </div>
      `;
    }
  }

  birthdaySection.innerHTML = has ? html : `<div class="card empty">No Birthdays Today</div>`;
}

function renderUpcomingBirthdays(now){

  let list = [];

  for(let id in birthdayData){

    let b = birthdayData[id];
    let days = daysUntilBirthday(b.dob, now);

    if(days > 0){
      list.push({ name:b.name, days });
    }
  }

  list.sort((a,b)=> a.days - b.days);
  list = list.slice(0,5);

  if(list.length === 0){
    upcomingBirthdaySection.innerHTML = `<div class="card empty">No upcoming birthdays</div>`;
    return;
  }

  upcomingBirthdaySection.innerHTML = `
    <div class="upcoming-list">
      ${list.map(item=>`
        <div class="upcoming-row">
          <span>${escapeHtml(item.name)}</span>
          <span class="upcoming-when">
            ${item.days === 1 ? "Tomorrow" : "In " + item.days + " days"}
          </span>
        </div>
      `).join("")}
    </div>
  `;
}

/* ======================
   PRIORITY REORDER
   While Mowlid is in its active date range, Mowlid + Tabarruk
   move to the top of the page, above Announcements.
====================== */

function reorderSections(){

  let container = document.getElementById("mainContainer");
  let secAnn = document.getElementById("sec-announcements");
  let secEvents = document.getElementById("sec-events");
  let secMowlid = document.getElementById("sec-mowlid");
  let secTabarruk = document.getElementById("sec-tabarruk");

  if(mowlidIsActivePeriod){
    container.insertBefore(secMowlid, container.firstChild);
    container.insertBefore(secTabarruk, secMowlid.nextSibling);
    container.insertBefore(secAnn, secTabarruk.nextSibling);
    container.insertBefore(secEvents, secAnn.nextSibling);
  } else {
    container.insertBefore(secAnn, container.firstChild);
    container.insertBefore(secEvents, secAnn.nextSibling);
    container.insertBefore(secMowlid, secEvents.nextSibling);
    container.insertBefore(secTabarruk, secMowlid.nextSibling);
  }
}

/* ===========================
   🎂 BIRTHDAY POPUP (age fixed)
=========================== */

function openBirthdayPopup(){

/* =========================
   🌳 PUBLIC TREE VIEW
========================= */

function renderTreeTabs(){

  let ids = Object.keys(treesData);

  if(!activeTree && ids.length) activeTree = ids[0];

  treeTabs.innerHTML = ids.map(id=>`

function switchTree(id){

  renderTreeTabs();
}

function relationLabel(person){

  let parts = [];

  if(person.father && peopleData[person.father]){
    let word = person.gender === "female" ? "D/O" : "S/O";
    parts.push(`${word} ${escapeHtml(peopleData[person.father].name)}`);
  }

  if(person.mother && peopleData[person.mother]){
    parts.push(`Mother: ${escapeHtml(peopleData[person.mother].name)}`);
  }

  if(person.spouse && peopleData[person.spouse]){
    parts.push(`Spouse: ${escapeHtml(peopleData[person.spouse].name)}`);
  }

  return parts.join("<br>");
}

function sortByOrder(list){
  return list.slice().sort((a,b)=>{
    let ao = (a.order===null||a.order===undefined) ? Infinity : a.order;
    let bo = (b.order===null||b.order===undefined) ? Infinity : b.order;
    if(ao !== bo) return ao - bo;
    return a.name.localeCompare(b.name);
  });
}

/* ===========================
   GENERATION ENGINE
   A person's generation is based on blood lineage (father chain).
   Someone with no father in the tree (a married-in spouse) is placed
   at their partner's generation instead of being treated as a root —
   only a person with NO father AND NO blood-linked spouse becomes an
   actual generation-0 root. This also means a person can only ever
   appear once in the tree, so the old "duplicate couple" edge case
   is no longer structurally possible.
=========================== */

function computeLevel(id, map, cache, visiting){

  if(cache.has(id)) return cache.get(id);

  let p = map[id];
  if(!p) return 0;

  if(visiting.has(id)) return 0; // cycle guard (e.g. a founding couple pointing at each other)

  visiting.add(id);

  let lvl;

  if(p.father && map[p.father]){
    lvl = computeLevel(p.father, map, cache, visiting) + 1;
  } else if(p.spouse && map[p.spouse]){
    lvl = computeLevel(p.spouse, map, cache, visiting);
  } else {
    lvl = 0;
  }

  visiting.delete(id);
  cache.set(id, lvl);

  return lvl;
}

function computeSortKey(id, map, cache){

  if(cache.has(id)) return cache.get(id);

  let p = map[id];
  if(!p) return "";

  let pad = n => String(n===null||n===undefined?9999:n).padStart(5,"0");

  let key;

  if(p.father && map[p.father]){
    key = computeSortKey(p.father, map, cache) + "." + pad(p.order);
  } else if(p.spouse && map[p.spouse] && map[p.spouse].father && map[map[p.spouse].father]){
    key = computeSortKey(p.spouse, map, cache) + "-s";
  } else {
    key = pad(p.order);
  }

  cache.set(id, key);
  return key;
}

function buildFamilyUnits(people){

  let map = {};
  people.forEach(p=> map[p.id] = p);

  let levelCache = new Map();
  people.forEach(p=> computeLevel(p.id, map, levelCache, new Set()));

  let sortCache = new Map();
  let sorted = people.slice().sort((a,b)=>
    computeSortKey(a.id, map, sortCache).localeCompare(computeSortKey(b.id, map, sortCache))
  );

  let maxLevel = 0;
  sorted.forEach(p=> maxLevel = Math.max(maxLevel, levelCache.get(p.id) || 0));

  let generations = [];
  for(let i=0;i<=maxLevel;i++) generations[i] = [];

  let consumed = new Set();

  sorted.forEach(person=>{

    if(consumed.has(person.id)) return;
    consumed.add(person.id);

    let lvl = levelCache.get(person.id) || 0;
    let spouse = null;

    if(person.spouse && map[person.spouse] && !consumed.has(person.spouse) &&
       levelCache.get(person.spouse) === lvl){
      spouse = map[person.spouse];
      consumed.add(spouse.id);
    }

    generations[lvl].push({ mainPerson: person, spouse });
  });

  return generations;
}

function renderFamilyTree(){

  if(!activeTree){
    familyTreeContainer.innerHTML = `<div class="card empty">No family trees created yet</div>`;
    return;
  }

  let people = [];

  for(let id in peopleData){
    let p = peopleData[id];
    if(p.trees && p.trees[activeTree]){
      people.push({ id, ...p });
    }
  }

  if(people.length === 0){
    familyTreeContainer.innerHTML = `<div class="card empty">No people added to this tree yet</div>`;
    return;
  }

  let generations = buildFamilyUnits(people);

  let html = `
    <div class="tree-wrapper">
      <div class="tree-area">
        <svg class="tree-svg" id="treeSVG"></svg>
  `;

  generations.forEach(gen=>{

    html += `<div class="generation">`;

    gen.forEach(unit=>{

      let person = unit.mainPerson;
      let spouse = unit.spouse;
      let shared = person.trees && Object.keys(person.trees).length > 1;

      html += `
        <div class="family-unit">
          <div id="person-${person.id}" class="person-card ${shared ? 'shared-person' : ''}">
            ${shared ? `<div class="shared-badge">Shared</div>` : ""}
            <div class="person-name">${escapeHtml(person.name)}</div>
            <div class="person-meta">${relationLabel(person)}</div>
          </div>
          ${spouse ? `
            <div class="spouse-link"></div>
            <div id="person-${spouse.id}" class="person-card spouse-card">
              <div class="person-name">${escapeHtml(spouse.name)}</div>
              <div class="person-meta">${relationLabel(spouse)}</div>
            </div>
          ` : ""}
        </div>
      `;
    });

    html += `</div>`;
  });

  html += `</div></div>`;

  familyTreeContainer.innerHTML = html;

  setTimeout(()=>drawTreeLines(people), 100);
}

function drawTreeLines(people){

  let svg = document.getElementById("treeSVG");
  if(!svg) return;

  svg.innerHTML = "";

  let svgRect = svg.getBoundingClientRect();

  document.querySelectorAll("#familyTreeContainer .family-unit").forEach(unit=>{

    let cards = unit.querySelectorAll(".person-card");
    if(cards.length === 0) return;

    let firstRect = cards[0].getBoundingClientRect();
    let lastRect = cards[cards.length-1].getBoundingClientRect();

    let centerX = (firstRect.left + lastRect.right) / 2 - svgRect.left;
    let centerY = firstRect.bottom - svgRect.top;

    /* Children can belong to EITHER side of the couple, depending on
       which partner is the blood/lineage-continuing parent — so both
       ids need to be checked, not just the first card. */
    let mainId = cards[0].id.replace("person-","");
    let spouseId = cards.length > 1 ? cards[1].id.replace("person-","") : null;

    (people || []).forEach(child=>{

      if(child.father !== mainId && child.father !== spouseId) return;

      let childCard = document.getElementById("person-"+child.id);
      if(!childCard) return;

      let childRect = childCard.getBoundingClientRect();
      let childX = childRect.left + childRect.width/2 - svgRect.left;
      let childY = childRect.top - svgRect.top;
      let midY = (centerY + childY) / 2;

      svg.innerHTML += `
        <path d="M ${centerX} ${centerY} V ${midY} H ${childX} V ${childY}" class="connector-line"/>
      `;
    });
  });
}

/* Redraw connector lines on resize/rotation instead of leaving them stale */
let treeResizeTimer = null;
window.addEventListener('resize', ()=>{
  clearTimeout(treeResizeTimer);
  treeResizeTimer = setTimeout(()=>{
    if(activeTree) renderFamilyTree();
  }, 200);
});

/* ===========================
   HELPERS
=========================== */

function escapeHtml(str){
  if(str === null || str === undefined) return "";
  return String(str)
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;");
}
