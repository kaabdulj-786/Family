<!DOCTYPE html>
<html>
<head>
  <title>Family Admin</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>

<div class="sidebar">

  <img src="logo.png" class="logo-sidebar">

  <h2>Family Admin</h2>

  <button onclick="showSection('mowlid')">🕌 Mowlid</button>
  <button onclick="showSection('tabarruk')">🍽️ Tabarruk</button>
  <button onclick="showSection('birthdays')">🎂 Birthdays</button>
  <button onclick="showSection('announcements')">📢 Announcements</button>

</div>

<div class="main">

  <!-- MOWLID -->
  <div id="mowlid" class="section">

    <div class="card">
      <h2>🕌 Mowlid</h2>

      <input id="mName" placeholder="Mowlid Name">

      <input id="mDays" type="number" placeholder="Number of Days">

      <input id="mStart" type="date">

      <button class="primary-btn" onclick="saveMowlid()">
        Save Mowlid
      </button>

      <br><br>

      <button class="primary-btn" onclick="deleteMowlid()">
        Delete Mowlid
      </button>

    </div>

    <div id="mowlidPreview"></div>

  </div>

  <!-- TABARRUK -->
  <div id="tabarruk" class="section">

    <div class="card">
      <h2>🍽️ Tabarruk</h2>

      <div id="tabarrukList"></div>

      <br>

      <button class="primary-btn" onclick="saveTabarruk()">
        Save Tabarruk
      </button>

    </div>

  </div>

  <!-- BIRTHDAY -->
  <div id="birthdays" class="section">

    <div class="card">

      <h2>🎂 Birthdays</h2>

      <input id="bName" placeholder="Name">

      <input id="bDate" type="date">

      <button class="primary-btn" onclick="addBirthday()">
        Save Birthday
      </button>

    </div>

    <div id="birthdayList"></div>

  </div>

  <!-- ANNOUNCEMENTS -->
  <div id="announcements" class="section">

    <div class="card">

      <h2>📢 Announcements</h2>

      <input id="aTitle" placeholder="Title">

      <textarea id="aText" placeholder="Description"></textarea>

      <input id="aFrom" type="datetime-local">

      <input id="aTo" type="datetime-local">

      <button class="primary-btn" onclick="addAnnouncement()">
        Save Announcement
      </button>

    </div>

    <div id="announcementList"></div>

  </div>

</div>

<div id="toast" class="toast"></div>

<script src="script.js"></script>

</body>
</html>
