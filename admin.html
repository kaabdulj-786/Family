<!DOCTYPE html>
<html>
<head>
<title>Admin</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>

<div class="sidebar">
<h2>Admin</h2>
<button onclick="showSection('mowlid')">Mowlid</button>
<button onclick="showSection('tree')">Tree</button>
</div>

<div class="main">

<div id="mowlid" class="section">
<h2>Mowlid</h2>
<input id="mName" placeholder="Name">
<input id="mDays" type="number">
<input id="mStart" type="date">
<button onclick="saveMowlid()">Save</button>
</div>

<div id="tree" class="section">
<h2>Create Tree</h2>
<input id="treeName">
<button onclick="createTree()">Create</button>

<select id="treeSelect"></select>

<h3>Add Person</h3>
<input id="pName">
<select id="pTree"></select>
<select id="pFather"></select>
<select id="pSpouse"></select>
<button onclick="addPerson()">Add</button>

<div id="peopleList"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
