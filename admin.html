<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>

<div class="sidebar">
  <img src="logo.png" class="logo-sidebar">
  <h2>Family Admin</h2>

  <button onclick="showSection('tree')">Family Tree</button>
  <button onclick="showSection('birthdays')">Birthdays</button>
  <button onclick="showSection('announcements')">Announcements</button>
</div>

<div class="main">

<!-- 🌳 TREE -->
<div id="tree" class="section">

<h2>Create Family Tree</h2>
<input id="treeName" placeholder="Enter Tree Name">
<button onclick="createTree()">Create Tree</button>

<h3>Select Tree</h3>
<select id="treeSelect"></select>

<hr>

<h2>Add Person</h2>

<input id="pName" placeholder="Name">

<select id="pTree"></select>

<select id="pFather"></select>
<select id="pSpouse"></select>

<select id="pGender">
<option value="male">Male</option>
<option value="female">Female</option>
</select>

<button onclick="addPerson()">Add Person</button>

<h3>People List</h3>
<div id="peopleList" class="list-grid"></div>

<h3>Preview</h3>
<div id="treePreview"></div>

</div>

<!-- 🎂 -->
<div id="birthdays" class="section">
<h2>Birthdays</h2>
<input id="bName">
<input id="bDate" type="date">
<button onclick="addBirthday()">Save</button>
<div id="birthdayList" class="list-grid"></div>
</div>

<!-- 📢 -->
<div id="announcements" class="section">
<h2>Announcements</h2>
<input id="aTitle">
<input id="aText">
<input id="aFrom" type="datetime-local">
<input id="aTo" type="datetime-local">
<button onclick="addAnnouncement()">Save</button>
<div id="announcementList" class="list-grid"></div>
</div>

</div>

<div id="toast" class="toast"></div>

<script src="script.js"></script>
</body>
</html>
