<!DOCTYPE html>
<html>
<head>
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>

<div class="sidebar">
  <h2>Family Admin</h2>
  <button onclick="showSection('mowlid')">Mowlid</button>
  <button onclick="showSection('tabarruk')">Tabarruk</button>
  <button onclick="showSection('birthdays')">Birthdays</button>
  <button onclick="showSection('announcements')">Announcements</button>
  <button onclick="showSection('tree')">Family Tree</button>
</div>

<div class="main">

  <!-- MOWLID -->
  <div id="mowlid" class="section">
    <h2>Mowlid</h2>
    <input id="mName" placeholder="Name">
    <input id="mDays" type="number" placeholder="Days">
    <input id="mStart" type="date">
    <button onclick="saveMowlid()">Save</button>

    <div id="mowlidDisplay"></div>
  </div>

  <!-- TABARRUK -->
  <div id="tabarruk" class="section">
    <h2>Tabarruk</h2>
    <div id="tabarrukList"></div>
    <button onclick="saveTabarruk()">Save</button>
  </div>

  <!-- BIRTHDAYS -->
  <div id="birthdays" class="section">
    <h2>Birthdays</h2>
    <input id="bName" placeholder="Name">
    <input id="bDate" type="date">
    <button onclick="addBirthday()">Add</button>

    <div id="birthdayList"></div>
  </div>

  <!-- ANNOUNCEMENTS -->
  <div id="announcements" class="section">
    <h2>Announcements</h2>
    <input id="aTitle" placeholder="Title">
    <input id="aText" placeholder="Description">
    <input id="aFrom" type="datetime-local">
    <input id="aTo" type="datetime-local">
    <button onclick="addAnnouncement()">Add</button>

    <div id="announcementList"></div>
  </div>

  <!-- FAMILY TREE -->
  <div id="tree" class="section">
    <h2>Family Tree</h2>

    <input id="treeName" placeholder="New Tree Name">
    <button onclick="createTree()">Create Tree</button>

    <select id="treeSelect"></select>

    <h3>Add Person</h3>
    <input id="pName" placeholder="Name">

    <select id="pFather">
      <option value="">No Father</option>
    </select>

    <select id="pSpouse">
      <option value="">No Spouse</option>
    </select>

    <select id="pGender">
      <option value="male">Male</option>
      <option value="female">Female</option>
    </select>

    <button onclick="addPerson()">Add</button>

    <div id="peopleList"></div>
  </div>

</div>
<div id="toast" class="toast"></div>
<script src="script.js"></script>
</body>
</html>
