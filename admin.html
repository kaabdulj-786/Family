<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>

<body>

<div class="sidebar">
<img src="logo.png" class="logo-sidebar">
<h2>Family Admin</h2>

<button onclick="showSection('mowlid')">Mowlid</button>
<button onclick="showSection('tabarruk')">Tabarruk</button>
<button onclick="showSection('birthdays')">Birthdays</button>
<button onclick="showSection('announcements')">Announcements</button>
<button onclick="showSection('tree')">Family Tree</button>
</div>

<div class="main">

<div id="mowlid" class="section">
<h2>Mowlid</h2>
<input id="mName" placeholder="Name">
<input id="mDays" type="number" placeholder="Days">
<input id="mStart" type="date">
<button onclick="saveMowlid()">Save</button>
<button onclick="deleteMowlid()">Delete</button>
<div id="mowlidDisplay"></div>
</div>

<div id="tabarruk" class="section">
<h2>Tabarruk</h2>
<div id="tabarrukList"></div>
<button onclick="saveTabarruk()">Save</button>
</div>

<div id="birthdays" class="section">
<h2>Birthdays</h2>
<input id="bName">
<input id="bDate" type="date">
<button onclick="addBirthday()">Save</button>
<div id="birthdayList"></div>
</div>

<div id="announcements" class="section">
<h2>Announcements</h2>
<input id="aTitle">
<input id="aText">
<input id="aFrom" type="datetime-local">
<input id="aTo" type="datetime-local">
<button onclick="addAnnouncement()">Save</button>
<div id="announcementList"></div>
</div>

<div id="tree" class="section">

<h2>Create Tree</h2>
<input id="treeName">
<button onclick="createTree()">Create</button>

<select id="treeSelect"></select>

<h3>Add Person</h3>
<input id="pName" placeholder="Name">
<select id="pTree"></select>
<select id="pFather"></select>
<select id="pSpouse"></select>

<button onclick="addPerson()">Add</button>

<div id="peopleList"></div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
