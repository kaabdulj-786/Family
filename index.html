<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
body{margin:0;font-family:Segoe UI;background:#0f172a;display:flex;justify-content:center;align-items:center;height:100vh;}
.box{background:white;padding:30px;border-radius:16px;width:320px;text-align:center;}
input{width:100%;padding:10px;margin:10px 0;border-radius:8px;border:1px solid #ccc;}
button{padding:10px;width:100%;background:#0f766e;color:white;border:none;border-radius:8px;}
.link{cursor:pointer;color:#0f766e;font-size:13px;}
</style>
</head>

<body>

<div class="box">
<img src="logo.png" width="80"><h3>Family Portal</h3>

<select id="type">
<option value="family">Family</option>
<option value="admin">Admin</option>
</select>

<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">

<div id="rememberBox">
<input type="checkbox" id="remember"> Remember Me
</div>

<button onclick="login()">Login</button>
</div>

<script>
if(localStorage.getItem("familyLogged")){
location.href="home.html";
}

function login(){
let t=type.value,u=user.value,p=pass.value;

if(t==="admin" && u==="KathiriAdmin" && p==="Kathiriadmin@786#"){
location.href="admin.html";
}
else if(t==="family" && u==="Kathiri House" && p==="Kathiri@786"){
if(remember.checked) localStorage.setItem("familyLogged",true);
location.href="home.html";
}
else alert("Invalid");
}

type.onchange=()=>{
rememberBox.style.display = type.value==="family" ? "block":"none";
}
</script>

</body>
</html>
