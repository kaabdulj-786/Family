<!DOCTYPE html>
<html>
<head>

<title>Family Login</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:'Segoe UI',sans-serif;
  background:
  linear-gradient(135deg,#0f172a,#111827,#0f766e);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
}

body::before{
  content:"";
  position:absolute;
  width:500px;
  height:500px;
  background:rgba(16,185,129,0.18);
  border-radius:50%;
  filter:blur(100px);
  top:-120px;
  right:-100px;
}

.login-box{
  position:relative;
  z-index:2;
  width:380px;
  max-width:90vw;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.1);
  padding:35px;
  border-radius:28px;
  box-shadow:0 20px 50px rgba(0,0,0,0.35);
  text-align:center;
  color:white;
}

.logo{
  width:95px;
  margin-bottom:15px;
}

h2{
  margin:0;
  margin-bottom:8px;
  font-size:26px;
}

.subtitle{
  color:#cbd5e1;
  font-size:14px;
  margin-bottom:25px;
}

input,
select{
  width:100%;
  padding:14px;
  margin-bottom:16px;
  border:none;
  border-radius:14px;
  background:rgba(255,255,255,0.12);
  color:white;
  font-size:14px;
  outline:none;
}

input::placeholder{
  color:#cbd5e1;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:14px;
  background:#10b981;
  color:white;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:0.25s;
}

button:hover{
  background:#059669;
  transform:translateY(-2px);
}

.remember{
  display:flex;
  align-items:center;
  gap:8px;
  margin-bottom:18px;
  font-size:14px;
  color:#e2e8f0;
}

.show-pass{
  text-align:right;
  margin-top:-8px;
  margin-bottom:15px;
  font-size:13px;
  cursor:pointer;
  color:#cbd5e1;
}

.show-pass:hover{
  text-decoration:underline;
}

.error-msg{
  color:#fca5a5;
  font-size:13px;
  margin:-8px 0 14px;
  min-height:16px;
}

.footer{
  margin-top:20px;
  font-size:12px;
  color:#94a3b8;
}

</style>

</head>

<body>

<div class="login-box">

  <img src="logo.png" class="logo" onerror="this.style.display='none'">

  <h2>ILLATH AL KATHIRI</h2>

  <div class="subtitle">Family Digital Portal</div>

  <select id="type">
    <option value="family">Family Login</option>
    <option value="admin">Admin Login</option>
  </select>

  <input id="user" placeholder="Username" autocomplete="username">

  <input id="pass" type="password" placeholder="Password" autocomplete="current-password">

  <div class="show-pass" onclick="togglePassword()">Show Password</div>

  <div id="rememberBox" class="remember">
    <input type="checkbox" id="remember" style="width:auto">
    Remember Me
  </div>

  <div id="errorMsg" class="error-msg"></div>

  <button onclick="login()">Login</button>

  <div class="footer">Secure Family Access System</div>

</div>

<script>

/* AUTO LOGIN IF REMEMBERED */
if(localStorage.getItem("familyLogged")){
  sessionStorage.setItem("familyLogged","1");
  location.href = "home.html";
}

function togglePassword(){
  let p = document.getElementById("pass");
  p.type = (p.type === "password") ? "text" : "password";
}

/*
  NOTE ON SECURITY:
  This is a client-side-only login check (no backend auth server).
  It stops casual visitors from opening admin.html/home.html directly
  without going through this page, but a technically determined person
  could still bypass it. Real protection requires Firebase Authentication
  + Firebase Security Rules on the database (a deferred Phase 6 item).
*/

function login(){

  let type = document.getElementById("type").value;
  let user = document.getElementById("user").value.trim();
  let pass = document.getElementById("pass").value;
  let errorMsg = document.getElementById("errorMsg");

  errorMsg.innerText = "";

  if(
    type === "admin" &&
    user === "KathiriAdmin" &&
    pass === "Kathiriadmin@786#"
  ){
    sessionStorage.setItem("adminLogged","1");
    location.href = "admin.html";
    return;
  }

  if(
    type === "family" &&
    user === "Kathiri House" &&
    pass === "Kathiri@786"
  ){
    sessionStorage.setItem("familyLogged","1");

    if(document.getElementById("remember").checked){
      localStorage.setItem("familyLogged","1");
    }

    location.href = "home.html";
    return;
  }

  errorMsg.innerText = "Invalid username or password";
}

document.getElementById("type").onchange = function(){
  document.getElementById("rememberBox").style.display =
    (this.value === "family") ? "flex" : "none";
};

document.getElementById("pass").addEventListener("keydown", e=>{
  if(e.key === "Enter") login();
});

</script>

</body>
</html>
