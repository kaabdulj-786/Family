<!DOCTYPE html>
<html>
<head>
<title>Family Login</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI';
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f766e,#1e3a8a);
}

/* LOGIN BOX */
.login-box{
  width:320px;
  padding:30px;
  background:rgba(255,255,255,0.95);
  border-radius:18px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
}

/* LOGO */
.logo{
  width:70px;
  margin-bottom:10px;
}

/* TITLE */
.title{
  font-size:20px;
  font-weight:600;
  margin-bottom:20px;
}

/* TABS */
.tabs{
  display:flex;
  margin-bottom:20px;
  border-radius:10px;
  overflow:hidden;
}

.tab{
  flex:1;
  padding:10px;
  cursor:pointer;
  background:#e5e7eb;
}

.tab.active{
  background:#0f766e;
  color:white;
  font-weight:500;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
  border:1px solid #ccc;
  outline:none;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:25px;
  background:#0f766e;
  color:white;
  cursor:pointer;
  margin-top:10px;
  transition:0.2s;
}

button:hover{
  background:#115e59;
}

/* REMEMBER */
.remember{
  display:flex;
  align-items:center;
  font-size:13px;
  margin-top:5px;
}

.remember input{
  width:auto;
  margin-right:5px;
}

/* ERROR */
.error{
  color:red;
  font-size:13px;
  margin-top:8px;
}
</style>

</head>

<body>

<div class="login-box">

  <img src="logo.png" class="logo">
  <div class="title">Family Portal</div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('family')">Family</div>
    <div class="tab" onclick="switchTab('admin')">Admin</div>
  </div>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <div id="rememberBox" class="remember">
    <input type="checkbox" id="remember">
    Remember Me
  </div>

  <button onclick="login()">Login</button>

  <div id="error" class="error"></div>

</div>

<script>

let mode = "family";

/* SWITCH TAB */
function switchTab(type){
  mode = type;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  event.target.classList.add("active");

  // Show remember only for family
  document.getElementById("rememberBox").style.display =
    (mode === "family") ? "flex" : "none";

  document.getElementById("error").innerText="";
}

/* LOGIN */
function login(){

  let user = document.getElementById("username").value;
  let pass = document.getElementById("password").value;

  if(mode === "family"){

    if(user==="Kathiri House" && pass==="Kathiri@786"){

      if(document.getElementById("remember").checked){
        localStorage.setItem("familyLogin","true");
      }

      window.location.href = "home.html";

    }else{
      showError("Invalid Family Login");
    }

  }else{

    if(user==="KathiriAdmin" && pass==="Kathiriadmin@786#"){
      window.location.href = "admin.html";
    }else{
      showError("Invalid Admin Login");
    }

  }
}

/* ERROR */
function showError(msg){
  document.getElementById("error").innerText = msg;
}

/* AUTO LOGIN (REMEMBER) */
window.onload = function(){
  if(localStorage.getItem("familyLogin")==="true"){
    window.location.href = "home.html";
  }
}

</script>

</body>
</html>
