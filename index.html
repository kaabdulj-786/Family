<!DOCTYPE html>
<html>
<head>
<title>Family Login</title>

<style>
body{
  margin:0;
  font-family:Arial;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(135deg,#0f766e,#1e3a8a);
}

.login-box{
  width:320px;
  padding:30px;
  background:white;
  border-radius:15px;
  text-align:center;
}

.logo{
  width:60px;
  margin-bottom:10px;
}

.tabs{
  display:flex;
  margin-bottom:15px;
}

.tab{
  flex:1;
  padding:10px;
  background:#ddd;
  cursor:pointer;
}

.tab.active{
  background:#0f766e;
  color:white;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:20px;
  background:#0f766e;
  color:white;
  margin-top:10px;
  cursor:pointer;
}

.remember{
  font-size:13px;
  margin-top:5px;
}

.error{
  color:red;
  font-size:13px;
  margin-top:8px;
}
</style>

</head>

<body>

<div class="login-box">

  <img src="logo.png" class="logo">

  <div class="tabs">
    <div class="tab active" onclick="switchTab('family', this)">Family</div>
    <div class="tab" onclick="switchTab('admin', this)">Admin</div>
  </div>

  <input type="text" id="username" placeholder="Username">
 <div style="position:relative;">
  <input type="password" id="password" placeholder="Password" style="padding-right:40px;">
  <span onclick="togglePassword()" 
        style="position:absolute; right:10px; top:50%; transform:translateY(-50%); cursor:pointer;">
    👁️
  </span>
</div>

  <div id="rememberBox" class="remember">
    <input type="checkbox" id="remember"> Remember Me
  </div>

  <button onclick="login()">Login</button>

  <div id="error" class="error"></div>

</div>

<script>
let mode="family";

function switchTab(type, el){
  mode=type;

  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");

  document.getElementById("rememberBox").style.display =
    (mode==="family")?"block":"none";

  document.getElementById("error").innerText="";
}

function login(){

  let user=document.getElementById("username").value;
  let pass=document.getElementById("password").value;

  if(mode==="family"){
    if(user==="Kathiri House" && pass==="Kathiri@786"){

      if(document.getElementById("remember").checked){
        localStorage.setItem("familyLogin","true");
      }

      window.location.href="home.html";

    }else{
      document.getElementById("error").innerText="Invalid Family Login";
    }

  }else{
    if(user==="KathiriAdmin" && pass==="Kathiriadmin@786#"){
      window.location.href="admin.html";
    }else{
      document.getElementById("error").innerText="Invalid Admin Login";
    }
  }
}
/* 👁️ TOGGLE PASSWORD (ADD THIS PART) */
function togglePassword(){
  let pass = document.getElementById("password");
  let icon = document.getElementById("eyeIcon");

  if(pass.type === "password"){
    pass.type = "text";
    icon.innerText = "🙈";
  }else{
    pass.type = "password";
    icon.innerText = "👁️";
  }
}

/* AUTO LOGIN */
window.onload=function(){
  if(localStorage.getItem("familyLogin")==="true"){
    window.location.href="home.html";
  }
}
</script>

</body>
</html>
